<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IT Helpdesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Navigation & History -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="brand-text">IT HELPDESK</h2>
            </div>
            
            <div class="sidebar-nav top-nav">
                <div class="nav-item active" id="nav-helpdesk">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>Helpdesk</span>
                </div>

                <div class="nav-item" id="nav-chatpro">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    <span>ChatPro</span>
                </div>
            </div>

            <div class="sidebar-section-title">
                <span>Recent Chats</span>
                <button id="new-chat-btn" title="New Chat">+</button>
            </div>
            
            <div class="history-list" id="history-list">
                <!-- Chat history items will appear here -->
            </div>
            
            <div class="sidebar-nav bottom-nav">
                <div class="nav-item" id="nav-login">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                    <span>Login</span>
                </div>
                <div class="nav-item" id="nav-signup">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    <span>Sign Up</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <header class="chat-header">
                <div class="header-left">
                    <div class="header-text">
                        <span class="status-indicator"></span>
                        <h2 id="mode-title">IT HELPDESK</h2>
                    </div>
                </div>
            </header>
            
            <main class="message-area" id="message-area">
                <!-- Initial greeting will be injected via JS if it's a new chat -->
            </main>
            
            <footer class="input-area">
                <form id="chat-form" class="brutal-form">
                    <div class="upload-container" id="upload-container" style="display: none;">
                        <input type="file" id="file-upload" hidden>
                        <button type="button" id="upload-btn" class="icon-btn" title="Attach file">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                    <div class="input-wrapper">
                        <div id="file-preview" class="file-preview" style="display: none;">
                            <span id="file-name">filename.txt</span>
                            <button type="button" id="clear-file" title="Remove attachment">×</button>
                        </div>
                        <input type="text" id="user-input" placeholder="describe your issue..." autocomplete="off" required>
                    </div>
                    <button type="submit" id="send-button" class="btn-primary">
                        <span>GO »</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </footer>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal" style="display: none;">
        <div class="auth-box">
            <button class="close-modal" id="close-auth">×</button>
            <h2 id="auth-title">LOGIN FORM</h2>
            <div class="auth-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" class="auth-user-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            
            <form id="auth-form" class="brutal-form-stacked">
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="auth-username" placeholder="Username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="auth-password" placeholder="Password" required autocomplete="off">
                </div>
                
                <button type="submit" id="auth-submit-btn" class="btn-primary auth-btn">LOGIN</button>
                
                <div class="auth-utilities">
                    <label class="remember-me">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
            </form>
            <p class="auth-switch-text" id="auth-switch-text">
                Don't have an account? <span id="auth-switch-link">Sign Up</span>
            </p>
        </div>
    </div>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
